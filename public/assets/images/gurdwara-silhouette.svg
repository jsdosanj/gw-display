<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" role="img" aria-label="Silhouette of a Gurdwara with Nishan Sahib">
  <defs>
    <radialGradient id="gurdwara-glow" cx="50%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#e4bb5e" stop-opacity="0.26" />
      <stop offset="100%" stop-color="#050b14" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="gurdwara-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7d989" />
      <stop offset="55%" stop-color="#e4bb5e" />
      <stop offset="100%" stop-color="#bd8a22" />
    </linearGradient>
  </defs>
  <rect width="200" height="280" fill="#050b14" />
  <circle cx="100" cy="90" r="95" fill="url(#gurdwara-glow)" />

  <!-- Nishan Sahib flagpole -->
  <rect x="151" y="20" width="3" height="150" fill="url(#gurdwara-fill)" />
  <!-- Triangular flag -->
  <path fill="url(#gurdwara-fill)" d="M154 26 L188 42 L154 58 Z" />
  <!-- Finial atop pole (khanda-like point) -->
  <path fill="url(#gurdwara-fill)" d="M152.5 14 L155.5 14 L154 22 Z" />

  <!-- Central large dome on drum -->
  <path fill="url(#gurdwara-fill)" d="M78 78 C78 54 122 54 122 78 L122 92 L78 92 Z" />
  <rect x="86" y="92" width="28" height="18" fill="url(#gurdwara-fill)" />
  <!-- Dome finial -->
  <rect x="98.5" y="44" width="3" height="14" fill="url(#gurdwara-fill)" />
  <circle cx="100" cy="42" r="4" fill="url(#gurdwara-fill)" />

  <!-- Smaller flanking domes -->
  <path fill="url(#gurdwara-fill)" d="M48 96 C48 80 74 80 74 96 L74 106 L48 106 Z" />
  <path fill="url(#gurdwara-fill)" d="M126 96 C126 80 152 80 152 96 L152 106 L126 106 Z" />
  <rect x="98.5" y="58" width="0" height="0" fill="none" />

  <!-- Main hall body with arched entrance -->
  <path
    fill="url(#gurdwara-fill)"
    d="M30 110
       L170 110
       L176 130
       L176 240
       L24 240
       L24 130
       Z"
  />
  <!-- Central arched doorway -->
  <path fill="#050b14" fill-opacity="0.82" d="M88 240 L88 190 C88 172 112 172 112 190 L112 240 Z" />
  <!-- Flanking arched windows -->
  <path fill="#050b14" fill-opacity="0.7" d="M46 240 L46 200 C46 188 62 188 62 200 L62 240 Z" />
  <path fill="#050b14" fill-opacity="0.7" d="M138 240 L138 200 C138 188 154 188 154 200 L154 240 Z" />

  <!-- Decorative chattris on hall corners -->
  <path fill="url(#gurdwara-fill)" d="M28 110 C28 100 40 100 40 110 L40 116 L28 116 Z" />
  <path fill="url(#gurdwara-fill)" d="M160 110 C160 100 172 100 172 110 L172 116 L160 116 Z" />

  <!-- Steps / plinth -->
  <rect x="14" y="240" width="172" height="10" fill="url(#gurdwara-fill)" fill-opacity="0.7" />
  <rect x="6" y="250" width="188" height="10" fill="url(#gurdwara-fill)" fill-opacity="0.45" />
</svg>
